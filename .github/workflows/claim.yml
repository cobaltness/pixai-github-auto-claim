name: Daily Pixai Claim

on:
  schedule:
    # Her gün 06:00 UTC (Türkiye'de 09:00 - Yazlık saat) çalış
    - cron: '0 6 * * *'
  # Manual olarak çalıştırmak için
  workflow_dispatch:

jobs:
  claim:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium webdriver-manager
      
      - name: Download ChromeDriver
        uses: nanasess/setup-chromedriver@master
      
      - name: Run Pixai claim script
        env:
          PIXAI_EMAIL: ${{ secrets.PIXAI_EMAIL }}
          PIXAI_PASSWORD: ${{ secrets.PIXAI_PASSWORD }}
        run: python claim.py